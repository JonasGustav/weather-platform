trigger: none

pr: none

# Auto-triggered when CI completes successfully on main
resources:
  pipelines:
    - pipeline: ci
      source: JG-WeatherHistory.ci
      trigger:
        branches:
          include:
            - main

pool:
  name: Default

variables:
  - template: variables/vars-test.yml
  - group: jg-weatherhistory-secrets-t  # Must contain: subscriptionId, sqlAdminLogin, sqlAdminPassword

stages:
  - stage: Approve
    displayName: Approve Deployment to Test
    jobs:
      - deployment: WaitForApproval
        displayName: Approval Gate
        environment: jg-weatherhistory-t  # Must match your Azure DevOps environment name
        strategy:
          runOnce:
            deploy:
              steps:
                - script: echo "Approved — proceeding to deploy Test"

  - stage: DeployTest
    displayName: Deploy to Test
    dependsOn: Approve
    jobs:
      - template: templates/template-deploy-all.yml
        parameters:
          appName: $(appName)
          environment: $(environment)
          location: $(location)
          serviceConnection: $(serviceConnection)
          paramsFile: $(paramsFile)
