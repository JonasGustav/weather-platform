parameters:
  - name: appName
    type: string
    default: JG-WeatherHistory
  - name: environment
    type: string
  - name: location
    type: string
    default: swedencentral
  - name: serviceConnection
    type: string
  - name: paramsFile
    type: string

jobs:
  - deployment: DeployInfrastructure
    displayName: Deploy Infrastructure and code
    environment: ${{ parameters.appName }}-${{ parameters.environment }}
    strategy:
      runOnce:
        deploy:
          steps:
            - checkout: self

            - task: AzureCLI@2
              displayName: Ensure Resource Group
              inputs:
                azureSubscription: ${{ parameters.serviceConnection }}
                scriptType: ps
                scriptLocation: inlineScript
                inlineScript: |
                  az group create `
                    --name rg-${{ parameters.appName }}-${{ parameters.environment }} `
                    --location ${{ parameters.location }} `
                    --output none
                  Write-Host "Resource group rg-${{ parameters.appName }}-${{ parameters.environment }} ready."

            - task: AzureResourceManagerTemplateDeployment@3
              displayName: Deploy Bicep
              inputs:
                deploymentScope: Subscription
                azureResourceManagerConnection: ${{ parameters.serviceConnection }}
                subscriptionId: $(subscriptionId)
                location: ${{ parameters.location }}
                templateLocation: Linked artifact
                csmFile: Deployment/JG-WeatherHistory.bicep
                csmParametersFile: ${{ parameters.paramsFile }}
                overrideParameters: >
                  -sqlAdminLogin $(sqlAdminLogin)
                  -sqlAdminPassword $(sqlAdminPassword)
                  -agentIpAddress $(agentIpAddress)
                deploymentMode: Incremental
                deploymentName: deploy-${{ parameters.appName }}-${{ parameters.environment }}

            - download: ci
              artifact: build-artifact

            - task: DotNetCoreCLI@2
              displayName: Restore Common
              inputs:
                command: restore
                projects: Code/Common/WeatherPlatform.Common.csproj

            - task: DotNetCoreCLI@2
              displayName: Install EF Core Tools
              inputs:
                command: custom
                custom: tool
                arguments: install --global dotnet-ef

            - task: DotNetCoreCLI@2
              displayName: Run EF Migrations
              inputs:
                command: custom
                custom: ef
                arguments: database update --project Code/Common/WeatherPlatform.Common.csproj
              env:
                ConnectionStrings__Default: Server=sql-jg-weatherhistory-${{ parameters.environment }}.database.windows.net;Database=sqldb-JG-WeatherHistory-${{ parameters.environment }};User Id=$(sqlAdminLogin);Password=$(sqlAdminPassword);Encrypt=True;

            - task: AzureFunctionApp@2
              displayName: Deploy Function App
              inputs:
                azureSubscription: ${{ parameters.serviceConnection }}
                appType: functionApp
                appName: func-${{ parameters.appName }}-${{ parameters.environment }}
                package: $(Pipeline.Workspace)/ci/build-artifact/func/**/*.zip
