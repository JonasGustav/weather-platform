trigger: none

pr: none

pool:
  name: Default

variables:
  - template: variables/vars-dev.yml
  - group: jg-weatherhistory-secrets-d  # Must contain: subscriptionId, sqlAdminLogin, sqlAdminPassword

stages:
  - stage: DeployDev
    displayName: Deploy to Dev
    jobs:
      - template: templates/template-deploy-all.yml
        parameters:
          appName: $(appName)
          environment: $(environment)
          location: $(location)
          serviceConnection: $(serviceConnection)
          paramsFile: $(paramsFile)
