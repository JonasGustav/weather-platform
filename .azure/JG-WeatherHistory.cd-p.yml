trigger: none

pr: none

# Triggered manually only — prod deploys require explicit approval in Azure DevOps environment gates
resources:
  pipelines:
    - pipeline: ci
      source: JG-WeatherHistory.ci
      trigger: none

pool:
  name: Default

variables:
  - template: variables/vars-prod.yml
  - group: jg-weatherhistory-secrets-p  # Must contain: subscriptionId, sqlAdminLogin, sqlAdminPassword

stages:
  - stage: DeployProd
    displayName: Deploy to Prod
    jobs:
      - template: templates/template-deploy-all.yml
        parameters:
          appName: $(appName)
          environment: $(environment)
          location: $(location)
          serviceConnection: $(serviceConnection)
          paramsFile: $(paramsFile)
